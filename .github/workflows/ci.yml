name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npx eslint scripts/ tests/

      - name: Prettier
        run: npx prettier --check .

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          find .githooks/ hooks/ scripts/ -name '*.sh' -type f | xargs shellcheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npx c8 --reporter=text node --test tests/*.test.js

  plugin-contract:
    name: Plugin Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Plugin contract rule pack
        run: node scripts/validate.js --plugin

  validate:
    name: Plugin Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: JSON validity
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json; do
            python3 -m json.tool "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
          done

      - name: Version consistency
        run: |
          first=""
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json; do
            v=$(python3 -c "import json; d=json.load(open('$f')); print(d.get('version') or d['plugins'][0]['version'])")
            if [ -z "$first" ]; then
              first="$v"
            elif [ "$v" != "$first" ]; then
              echo "ERROR: Version mismatch — $f has $v, expected $first"
              exit 1
            fi
          done
          echo "All manifests at version $first"

      - name: Generated files in sync
        run: node scripts/generate-platform-files.js --check

      - name: Skill structure
        run: |
          errors=0
          for skill_dir in skills/*/; do
            skill_file="${skill_dir}SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "WARN: No SKILL.md in $skill_dir (skipping)"
              continue
            fi
            if ! head -20 "$skill_file" | grep -q "^name:"; then
              echo "ERROR: $skill_file missing 'name:' in frontmatter"
              errors=$((errors + 1))
            fi
            if ! head -20 "$skill_file" | grep -q "^description:"; then
              echo "ERROR: $skill_file missing 'description:' in frontmatter"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors skill validation error(s)"
            exit 1
          fi
          echo "All skills valid"
