<!--
  wireframe-base.html
  Starter template for wireframes generated by pm:groom Step 6.

  Step 6 inlines wireframe-base.css into the <style> block, fills in the
  wireframe-meta JSON, and adds <section class="screen"> blocks for each
  screen and state.

  Replace ALL `{{TOKEN}}` placeholders. Drop sections that don't apply.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{SLUG}} — Wireframe</title>

<!-- Step 6 inlines wireframe-base.css contents here. -->
<style>
{{WIREFRAME_BASE_CSS}}
</style>

<!-- For mockup-tier wireframes only: project Tailwind config + fonts. -->
<!-- BEGIN:MOCKUP_HEAD
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { {{PROJECT_THEME_TOKENS}} } } };
</script>
<link href="{{PROJECT_FONTS}}" rel="stylesheet">
END:MOCKUP_HEAD -->

<!-- Wireframe metadata. Read by the proposal renderer to auto-populate
     the screens caption under the hero prototype. -->
<script type="application/json" id="wireframe-meta">
{
  "slug": "{{SLUG}}",
  "fidelity": "{{FIDELITY}}",
  "screens": [
    { "id": "{{SCREEN_ID}}", "label": "{{SCREEN_LABEL}}", "states": ["populated"] }
  ],
  "viewport": "desktop",
  "includes_chrome": false,
  "design_system_source": "{{DESIGN_SYSTEM_SOURCE}}",
  "created": "{{DATE}}",
  "updated": "{{DATE}}"
}
</script>
</head>

<body class="fidelity-{{FIDELITY}}">

<div class="wireframe-doc">

  <header class="wireframe-meta-header">
    <span class="wireframe-title">{{SLUG}}</span>
    <span class="wireframe-fidelity">{{FIDELITY}} · desktop</span>
  </header>

  <!-- One <section class="screen"> per (screen × state) combination. -->
  <section class="screen" data-screen="{{SCREEN_ID}}" data-state="populated">
    <header class="screen-meta">
      <span class="screen-label">{{SCREEN_LABEL}}</span>
      <span class="screen-state" data-state="populated">populated</span>
    </header>
    <div class="screen-canvas">
      <!-- Screen content here. Use .wf-* primitives or project tokens. -->
    </div>
    <!-- Optional callouts (sketch + wireframe tiers only):
    <ol class="callout-notes">
      <li>Description of element marked with .callout[data-num="1"]</li>
    </ol>
    -->
  </section>

  <!-- Add more <section class="screen"> blocks for additional screens
       and states. State coverage required: populated (always);
       empty / loading / error when applicable. -->

</div>

</body>
</html>
